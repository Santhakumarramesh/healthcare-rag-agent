# Healthcare RAG Agent 芒聙聰 CI/CD Pipeline
#
# Flow (main branch push):
#   lint 芒聠聮 test 芒聠聮 docker-build 芒聠聮 docker-push (GHCR) 芒聠聮 sync-to-hf-spaces
#
# Flow (PR / develop push):
#   lint 芒聠聮 test 芒聠聮 docker-build  (no push, no deploy)
#
# Required GitHub Secrets:
#   HF_TOKEN   芒聙聰 Hugging Face token with write access to your Space
#               Get it: huggingface.co/settings/tokens 芒聠聮 New token (write)
# 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: healthcare-rag-api

jobs:
  # 芒聰聙芒聰聙 Job 1: Lint & format check 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff (linter + formatter check)
        run: ruff check . --output-format=github

  # 芒聰聙芒聰聙 Job 2: Unit tests 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      OPENAI_API_KEY: sk-test-placeholder
      JWT_SECRET_KEY: ci-test-secret-key-32-chars-long!!
      CORS_ORIGINS: http://localhost:8501
      APP_ENV: test
      LOG_LEVEL: WARNING
      FAISS_INDEX_PATH: ./vectorstore/faiss_index
      VECTOR_STORE_TYPE: faiss

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Create required directories
        run: mkdir -p vectorstore/faiss_index logs

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # 芒聰聙芒聰聙 Job 3: Docker build smoke-test (all branches) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "LOWERCASE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push 芒聙聰 smoke test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 芒聰聙芒聰聙 Job 4: Push to GHCR (main only) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  docker-push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.LOWERCASE_OWNER }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.LOWERCASE_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 芒聰聙芒聰聙 Job 5: Sync to Hugging Face Spaces (main only) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  sync-to-hf-spaces:
    name: Sync to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://huggingface.co/spaces/${{ vars.HF_USERNAME }}/healthcare-rag-api

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        # Syncs this repo to the HF Space git remote.
        # The Space will auto-rebuild the Docker image on every push.
        # Required secret: HF_TOKEN (Settings > Secrets > Actions)
        # Get token: huggingface.co/settings/tokens > New token (write scope)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "芒職聽茂赂聫  HF_TOKEN secret not set 芒聙聰 skipping HF Spaces sync."
            echo "    1. Go to huggingface.co/settings/tokens 芒聠聮 New token (write)"
            echo "    2. Add as GitHub secret: Settings 芒聠聮 Secrets 芒聠聮 Actions 芒聠聮 HF_TOKEN"
            echo "    3. Add HF_USERNAME as a repository variable (your HF username)"
            exit 0
          fi
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/healthcare-rag-api
          git push hf main --force
          echo "芒聹聟 Synced to HF Space: huggingface.co/spaces/$HF_USERNAME/healthcare-rag-api"

      - name: Verify HF Space health
        # Wait for HF to rebuild and check the /health endpoint
        env:
          HF_USERNAME: ${{ vars.HF_USERNAME }}
        run: |
          if [ -z "$HF_USERNAME" ]; then
            echo "芒職聽茂赂聫  HF_USERNAME not set 芒聙聰 skipping health check."
            exit 0
          fi
          echo "芒聫鲁 Waiting 3 min for HF Space to build and start..."
          sleep 180
          echo "冒聼聰聧 Checking API health..."
          for attempt in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              https://$HF_USERNAME-healthcare-rag-api.hf.space/health)
            if [ "$status" = "200" ]; then
              echo "芒聹聟 API is healthy (attempt $attempt)"
              exit 0
            fi
            echo "   Attempt $attempt: HTTP $status 芒聙聰 retrying in 30s..."
            sleep 30
          done
          echo "芒聺聦 Health check failed 芒聙聰 check the Space logs at huggingface.co/spaces/$HF_USERNAME/healthcare-rag-api"
          exit 1
