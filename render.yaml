services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: healthcare-rag-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python vectorstore/ingest.py"
    startCommand: "bash start_api.sh"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: EMBEDDING_MODEL
        value: "text-embedding-3-small"
      - key: VECTOR_STORE_TYPE
        value: "faiss"
      - key: FAISS_INDEX_PATH
        value: "./vectorstore/faiss_index"
      - key: MAX_RETRIEVED_DOCS
        value: "5"
      - key: RERANK_TOP_K
        value: "3"
      - key: CONFIDENCE_THRESHOLD
        value: "0.6"
      - key: LOG_LEVEL
        value: "INFO"
      - key: APP_ENV
        value: "production"

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  - type: web
    name: healthcare-rag-ui
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements-ui.txt"
    startCommand: "bash start_ui.sh"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: API_BASE_URL
        value: "https://healthcare-rag-api.onrender.com"
